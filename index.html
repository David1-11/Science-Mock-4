<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBEJU SENIOR HIGH SCHOOL - SS3 Mock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="exam-container">
        <header>
            <div class="school-header">
                <h1>IBEJU SENIOR HIGH SCHOOL</h1>
                <p>Official SS3 Science Mock Examination 2</p>
            </div>
            <div id="timer-box">90:00</div>
        </header>

        <div id="quiz-body">
            <div id="start-screen">
                <div class="welcome-box">
                    <h3>Candidate Login</h3>
                    <p>Enter your full name to generate your unique question paper.</p>
                </div>
                <input type="text" id="student-name" placeholder="Surname First, Other Names" required>
                <button id="begin-btn" onclick="startExam()">START EXAMINATION</button>
            </div>

            <div id="exam-screen" class="hidden">
                <div class="subject-nav">
                    <button id="tab-physics" class="tab-btn active" onclick="switchSubject('physics')">Physics</button>
                    <button id="tab-biology" class="tab-btn" onclick="switchSubject('biology')">Biology</button>
                </div>

                <div class="exam-meta">
                    <span id="q-number">Question 1/50</span>
                    <span id="subject-tag">PHYSICS</span>
                </div>

                <div id="question-area">
                    <p id="q-text">Loading question...</p>
                    <div id="options-grid"></div>
                </div>
            </div>
        </div>

        <div id="exam-controls" class="hidden">
            <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">Previous</button>
            <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next</button>
            <button id="submit-btn" class="hidden" onclick="finishExam()">FINISH & SUBMIT</button>
        </div>
    </div>
<div id="result-modal" class="modal-overlay hidden">
    <div class="result-card">
        <h2>CONGRATULATIONS!</h2>
        <p id="res-candidate-name"></p>
        <hr>
        <div class="score-breakdown">
            <div class="score-box">
                <h4>PHYSICS</h4>
                <p id="res-physics">0/50</p>
            </div>
            <div class="score-box">
                <h4>BIOLOGY</h4>
                <p id="res-biology">0/50</p>
            </div>
        </div>
        <div class="grand-total">
            <h3>TOTAL SCORE</h3>
            <h1 id="res-total">0/100</h1>
            <p id="res-percent">0%</p>
        </div>
        <button id="wa-submit-btn" onclick="sendToWhatsApp()">SEND TO SCHOOL PORTAL (WHATSAPP)</button>
    </div>
</div>
    <footer class="dev-footer">
        <p>Developed by <a href="https://wa.me/2347035646208" target="_blank" class="wa-link">Owoaje David</a></p>
    </footer>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
